<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Happy!</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
overflow-x:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
background-size:400% 400%;
animation:bg 15s infinite alternate;
color:white;
text-align:center;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

h1{
font-family:Pacifico;
font-size:55px;
margin-top:20px;
text-shadow:0 0 20px gold;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #fff;}
to{text-shadow:0 0 30px yellow,0 0 50px orange;}
}

.hero{
padding:30px;
}

.subtitle{
font-size:20px;
margin-top:10px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:40px;
background:#ff4081;
color:white;
cursor:pointer;
margin-top:25px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:#ff1493;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:40px;
}

.gallery img{
width:100%;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,.4);
transition:.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

.cake{
font-size:120px;
margin:20px;
animation:bounce 2s infinite;
}

@keyframes bounce{
50%{transform:translateY(-20px);}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:-1;
}

.balloon{
position:fixed;
bottom:-150px;
font-size:45px;
animation:float linear infinite;
}

@keyframes float{
to{
transform:translateY(-120vh);
}
}

.heart{
position:fixed;
top:-50px;
font-size:22px;
animation:fall linear infinite;
color:#ff0055;
}

@keyframes fall{
to{
transform:translateY(120vh);
}
}

.giftMessage{
display:none;
font-size:28px;
margin-top:30px;
animation:pop .6s;
}

@keyframes pop{
from{transform:scale(.2);}
to{transform:scale(1);}
}

.footer{
padding:25px;
font-size:18px;
}

@media(max-width:600px){

h1{
font-size:38px;
}

.subtitle{
font-size:18px;
}

.cake{
font-size:90px;
}
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="hero">

<h1>🎉 Happy Birthday! 🎂</h1>

<p class="subtitle">
Wishing my amazing little cousin a day full of love, laughter,
cakes, chocolates, and magical memories! 💖
</p>

<div class="cake">🎂</div>

<button onclick="surprise()">
🎁 Open Surprise Gift
</button>

<div class="giftMessage" id="gift">
🌟 Surprise! 🌟<br>
You are the sweetest, smartest, and most wonderful cousin ever! ❤️<br><br>
🍫🎁🍰🎈💖
</div>

</div>

<h2>📸 Happy Memories</h2>

<div class="gallery">

<img src="https://picsum.photos/400?1">
<img src="https://picsum.photos/400?2">
<img src="https://picsum.photos/400?3">
<img src="https://picsum.photos/400?4">
<img src="https://picsum.photos/400?5">
<img src="https://picsum.photos/400?6">

</div>

<div class="footer">
Made with ❤️ for the Best Cousin Ever
</div>

<!-- Music -->
<audio id="music" autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

// Surprise Button

function surprise(){
document.getElementById("gift").style.display="block";
launchFireworks();
confettiBlast();
}

// Balloons

for(let i=0;i<20;i++){

let b=document.createElement("div");

b.className="balloon";

b.innerHTML="🎈";

b.style.left=Math.random()*100+"vw";

b.style.animationDuration=(6+Math.random()*6)+"s";

b.style.fontSize=(35+Math.random()*30)+"px";

document.body.appendChild(b);

}

// Hearts

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(4+Math.random()*6)+"s";

h.style.opacity=Math.random();

document.body.appendChild(h);

}

// Fireworks

const canvas=document.getElementById("fireworks");

const ctx=canvas.getContext("2d");

canvas.width=innerWidth;

canvas.height=innerHeight;

let particles=[];

function launchFireworks(){

for(let i=0;i<150;i++){

particles.push({

x:innerWidth/2,

y:innerHeight/2,

dx:(Math.random()-.5)*8,

dy:(Math.random()-.5)*8,

life:100,

color:`hsl(${Math.random()*360},100%,60%)`

});

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{

ctx.beginPath();

ctx.arc(p.x,p.y,3,0,Math.PI*2);

ctx.fillStyle=p.color;

ctx.fill();

p.x+=p.dx;

p.y+=p.dy;

p.life--;

if(p.life<0)particles.splice(index,1);

});

requestAnimationFrame(animate);

}

animate();

// Confetti

function confettiBlast(){

for(let i=0;i<250;i++){

let c=document.createElement("div");

c.style.position="fixed";

c.style.left=Math.random()*100+"vw";

c.style.top="-20px";

c.style.width="8px";

c.style.height="14px";

c.style.background=`hsl(${Math.random()*360},100%,50%)`;

c.style.opacity=.9;

c.style.transform=`rotate(${Math.random()*360}deg)`;

c.style.transition="5s linear";

document.body.appendChild(c);

setTimeout(()=>{

c.style.top="110vh";

c.style.transform+=" rotate(720deg)";

},10);

setTimeout(()=>c.remove(),5500);

}

}

// Auto Fireworks

setInterval(launchFireworks,5000);

// Resize

window.onresize=()=>{

canvas.width=innerWidth;

canvas.height=innerHeight;

};

</script>

</body>
</html>
